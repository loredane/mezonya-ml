services:
  api:
    build: .
    ports:
      - "8080:8080"
    environment:
      MODEL_DIR: models
      CATALOG_PATH: data/device_catalog.json
      PREDICTION_LOG_PATH: /var/log/mezonya/predictions.jsonl
    volumes:
      # Persist the prediction log across runs so monitor.py has data to read.
      - ./data/logs:/var/log/mezonya
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
